<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Scanner</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    img {
      max-width: 300px;
      margin-top: 15px;
      border-radius: 10px;
      display: none;
    }

    .loading {
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Food Ingredient Extractor</h1>
  <p>Upload a normal food image or a barcode image.</p>
  <p>If a barcode is detected, the backend uses Open Food Facts. Otherwise it uses Gemini.</p>

  <div class="card">
    <input type="file" id="imageInput" accept="image/*" />
    <br><br>
    <button id="uploadBtn">Analyze</button>
    <div class="loading" id="loading"></div>
    <img id="preview" alt="Preview" />
  </div>

  <div class="card">
    <h3>JSON Result</h3>
    <pre id="result">No result yet.</pre>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
